name: Stack Verify

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Stack & Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js (frontend — React + Vite + TypeScript) ────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Python (backend — FastAPI) ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # ── Docker availability (optional — validate only, not required) ───────
      - name: Check Docker availability
        run: |
          if docker --version &>/dev/null; then
            echo "[OK] Docker: $(docker --version)"
          else
            echo "[INFO] Docker not available on this runner — skipping Docker checks."
          fi

      # ── Frontend dependencies ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Backend dependencies ───────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: pip install --quiet -r requirements.txt

      # ── Environment variable validation ───────────────────────────────────
      - name: Validate environment variables
        env:
          # Safe CI defaults for non-secret vars
          APP_ENV: "ci"
          APP_DEBUG: "false"
          JWT_ALGORITHM: ${{ vars.JWT_ALGORITHM || 'HS256' }}
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.JWT_ACCESS_TOKEN_EXPIRE_MINUTES || '15' }}
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${{ vars.JWT_REFRESH_TOKEN_EXPIRE_DAYS || '30' }}
          BACKEND_HOST: "0.0.0.0"
          BACKEND_PORT: "8000"
          VITE_API_BASE_URL: "http://localhost:8000/api/v1"
          # Secrets — presence checked only, values never printed
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: bash scripts/ci-verify-stack.sh

      # ── Stack verification script ──────────────────────────────────────────
      - name: Run stack verification
        run: bash scripts/verify-stack.sh
