name: Screenshot on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

jobs:
  screenshot:
    name: Capture UI Screenshots
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: "http://localhost:8000/api/v1"
        run: npm run build

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Serve built frontend
        working-directory: frontend
        run: |
          npx --yes serve dist --listen 3000 &
          # Wait for the server to be ready (up to 20 seconds)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready."
              break
            fi
            echo "Waiting for server... ($i/10)"
            sleep 2
          done

      - name: Take screenshots with Playwright
        run: |
          mkdir -p screenshots
          node scripts/capture-screenshots.js

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-pr-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 30

      - name: Commit screenshots to docs/screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p docs/screenshots
          if ls screenshots/*.png > /dev/null 2>&1; then
            cp screenshots/*.png docs/screenshots/
          else
            echo "No screenshots found to commit."
          fi

          git add docs/screenshots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new screenshots to commit."
          else
            git commit -m "chore: capture UI screenshots after PR #${{ github.event.pull_request.number }} merge [skip ci]"
            git push
          fi

      - name: Post screenshot links to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const screenshotsDir = 'screenshots';
            if (!fs.existsSync(screenshotsDir)) {
              console.log('Screenshots directory not found — skipping comment.');
              return;
            }
            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (!files.length) {
              console.log('No screenshots generated.');
              return;
            }

            const list = files.map(f => `- \`${f}\``).join('\n');
            const body = `## 📸 UI Screenshots captured\n\nScreenshots taken after this PR was merged.\n[View artifact](${runUrl})\n\n${list}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
