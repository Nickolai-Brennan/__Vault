name: Code Cleanup & Formatting

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

jobs:
  cleanup:
    name: Auto-format and clean code
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Frontend: ESLint auto-fix + Prettier ──────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Prettier
        run: npm install --global prettier@^3

      - name: Run ESLint auto-fix (frontend)
        working-directory: frontend
        run: npx eslint . --fix
        continue-on-error: true

      - name: Run Prettier (frontend)
        working-directory: frontend
        run: npx prettier --write "src/**/*.{ts,tsx,js,jsx,css,json}"
        continue-on-error: true

      # ── Backend: Black + isort ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting tools
        run: pip install --quiet black isort

      - name: Run Black (backend)
        run: black backend/
        continue-on-error: true

      - name: Run isort (backend)
        run: isort backend/
        continue-on-error: true

      # ── Commit formatted changes ───────────────────────────────────────────
      - name: Commit formatting changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src backend/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Code is already clean — nothing to commit."
          else
            git commit -m "style: auto-format code after PR #${{ github.event.pull_request.number }} merge [skip ci]"
            git push
          fi
